name: Build Pre-built Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-prebuilt-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/cloud-relay
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cloud-relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

  build-prebuilt-home:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - stack: default
            mail: stalwart
            webmail: snappymail
            calendar: builtin
          - stack: conservative
            mail: postfix-dovecot
            webmail: roundcube
            calendar: radicale
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/home-${{ matrix.mail }}
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.stack }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.stack }}
            type=raw,value=${{ matrix.stack }}
            type=raw,value=latest,enable=${{ matrix.stack == 'default' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./home-device/${{ matrix.mail }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            WEBMAIL=${{ matrix.webmail }}
            CALENDAR=${{ matrix.calendar }}
            VERSION=${{ github.ref_name }}
