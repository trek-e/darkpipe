name: Build Custom Stack

on:
  workflow_dispatch:
    inputs:
      mail_server:
        description: 'Mail server component'
        required: true
        type: choice
        default: 'stalwart'
        options:
          - stalwart
          - maddy
          - postfix-dovecot
      webmail:
        description: 'Webmail component'
        type: choice
        default: 'snappymail'
        options:
          - none
          - roundcube
          - snappymail
      calendar:
        description: 'Calendar/contacts'
        type: choice
        default: 'builtin'
        options:
          - none
          - radicale
          - builtin
      tag_suffix:
        description: 'Optional tag suffix (e.g., "custom-01")'
        type: string
        required: false

permissions:
  packages: write
  contents: read

jobs:
  build-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/cloud-relay
          tags: |
            type=sha
            type=raw,value=${{ github.run_number }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ inputs.tag_suffix }},enable=${{ inputs.tag_suffix != '' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cloud-relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

  build-home:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/home-${{ inputs.mail_server }}
          tags: |
            type=sha
            type=raw,value=${{ github.run_number }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ inputs.tag_suffix }},enable=${{ inputs.tag_suffix != '' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./home-device/${{ inputs.mail_server }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            WEBMAIL=${{ inputs.webmail }}
            CALENDAR=${{ inputs.calendar }}
            VERSION=${{ github.sha }}
