# Maddy Mail Server Configuration
# Documentation: https://maddy.email/
# Version: 0.8.2 (beta - use with caution)
#
# SECURITY NOTE: This configuration uses self-signed TLS certificates.
# For production use with public DNS, replace with Let's Encrypt certificates.
#
# WARNING: Maddy developers state this should be regarded as a beta product.
# Recommended for testing or non-critical deployments with external backups.

# ============================================================================
# Global Variables
# ============================================================================

$(hostname) = {env:MAIL_HOSTNAME}
$(local_domains) = {env:MAIL_DOMAIN}

# Primary mail domain (can add more: example.com example.org)
# Format: user@domain becomes the account identifier

# ============================================================================
# TLS Configuration
# ============================================================================

tls file /data/tls/cert.pem /data/tls/key.pem {
    # Self-signed certificate (generated by entrypoint if missing)
    # For production with public DNS, use Let's Encrypt:
    #   tls file /etc/letsencrypt/live/mail.example.com/fullchain.pem \
    #            /etc/letsencrypt/live/mail.example.com/privkey.pem
}

# ============================================================================
# Storage Backend
# ============================================================================

storage.imapsql local_mailboxes {
    driver sqlite3
    dsn imapsql.db
}

# ============================================================================
# Authentication Database
# ============================================================================

table.file local_accounts {
    file /data/accounts
}

auth.pass_table local_authdb {
    table local_accounts
}

# ============================================================================
# SMTP Endpoint (Port 25 - Inbound from Cloud Relay)
# ============================================================================

smtp tcp://0.0.0.0:25 {
    hostname $(hostname)

    # No TLS required for inbound from cloud relay
    # (traffic already encrypted via WireGuard tunnel)
    tls off

    # No authentication required for local delivery
    # (cloud relay is on trusted WireGuard network 10.8.0.0/24)

    # Source IP filtering (accept from WireGuard subnet + localhost)
    source 127.0.0.0/8 10.8.0.0/24 {
        # Deliver to local domains
        destination $(local_domains) {
            deliver_to &local_mailboxes
        }

        # Reject everything else (no open relay)
        default_destination {
            reject 550 5.1.1 "User unknown"
        }
    }

    # Reject connections from other IPs
    default_source {
        reject 421 4.3.2 "Connection not accepted from your IP"
    }
}

# ============================================================================
# Submission Endpoint (Port 587 - Outbound from Mail Clients)
# ============================================================================

submission tcp://0.0.0.0:587 {
    hostname $(hostname)

    # STARTTLS required for submission
    tls &tls
    require_tls yes

    # Authentication required for submission
    auth &local_authdb

    # Authenticated users can send to any domain
    source $(local_domains) {
        deliver_to &remote_queue
    }
}

# ============================================================================
# IMAP Endpoint (Port 993 - Mail Client Access)
# ============================================================================

imap tcp://0.0.0.0:993 tls://&tls {
    auth &local_authdb
    storage &local_mailboxes
}

# ============================================================================
# Remote Queue (For Outbound Mail)
# ============================================================================

target.remote remote_queue {
    hostname $(hostname)

    # Outbound mail delivery (when authenticated users send to external domains)
    # Uses standard SMTP to deliver to remote MTAs
}

# ============================================================================
# Logging
# ============================================================================

# Log to stdout for container observability
log {
    output stderr
    level info
}

# ============================================================================
# User Account Management
# ============================================================================

# Create users by adding lines to /data/accounts file:
#   user@example.com:{PLAIN}password123
#   admin@example.com:{PLAIN}adminpass
#
# Password formats supported:
#   {PLAIN}password      - Plaintext (for testing only)
#   {BCRYPT}$2a$...      - Bcrypt hash (recommended)
#
# Generate bcrypt hash: maddy hash bcrypt "password"
#
# Multi-domain example:
#   user@example.com:{PLAIN}pass1
#   user@example.org:{PLAIN}pass2  (different account, different domain)
