version: '3.8'

# DarkPipe Home Device Mail Server
# Supports three mail server options via Docker Compose profiles:
#   - Stalwart (modern, all-in-one, IMAP4rev2/JMAP/CalDAV/CardDAV)
#   - Maddy (minimal, Go-based, single binary)
#   - Postfix+Dovecot (traditional, battle-tested MTA+IMAP)
#
# Webmail options via profiles:
#   - Roundcube (traditional, feature-rich, PHP-based)
#   - SnappyMail (modern, fast, lightweight)
#
# CalDAV/CardDAV options via profiles:
#   - Radicale (standalone server for Maddy/Postfix+Dovecot)
#   - Stalwart built-in (when using Stalwart mail server)
#
# Usage:
#   docker compose --profile stalwart --profile roundcube up -d                          # Stalwart (built-in CalDAV/CardDAV) + Roundcube
#   docker compose --profile maddy --profile snappymail --profile radicale up -d        # Maddy + SnappyMail + Radicale
#   docker compose --profile postfix-dovecot --profile roundcube --profile radicale up -d # Postfix+Dovecot + Roundcube + Radicale
#
# Environment variables (customize in .env or export):
#   MAIL_DOMAIN      - Primary mail domain (e.g., example.com)
#   MAIL_HOSTNAME    - Mail server hostname (e.g., mail.example.com)
#   ADMIN_EMAIL      - Admin email address (e.g., admin@example.com)
#   ADMIN_PASSWORD   - Admin password (CHANGE THIS!)

services:
  # Stalwart mail server (profile: stalwart)
  stalwart:
    image: stalwartlabs/stalwart:0.15.4
    profiles: ["stalwart"]
    container_name: stalwart
    restart: unless-stopped
    ports:
      - "25:25"    # SMTP inbound (from cloud relay)
      - "587:587"  # SMTP submission (from mail clients)
      - "993:993"  # IMAPS (from mail clients)
      - "8080:8080"  # Management API and Web UI
    volumes:
      - ./stalwart/config.toml:/opt/stalwart-mail/etc/config.toml:ro
      - ./stalwart/setup-users.sh:/opt/stalwart-mail/setup-users.sh:ro
      - mail-data:/opt/stalwart-mail/data
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-example.com}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME:-mail.example.com}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Maddy mail server (profile: maddy)
  maddy:
    image: foxcpp/maddy:0.8.2
    profiles: ["maddy"]
    container_name: maddy
    restart: unless-stopped
    ports:
      - "25:25"    # SMTP inbound (from cloud relay)
      - "587:587"  # SMTP submission (from mail clients)
      - "993:993"  # IMAPS (from mail clients)
    volumes:
      - ./maddy/maddy.conf:/data/maddy.conf:ro
      - ./maddy/setup-users.sh:/data/setup-users.sh:ro
      - mail-data:/data
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-example.com}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME:-mail.example.com}
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Postfix+Dovecot mail server (profile: postfix-dovecot)
  postfix-dovecot:
    build:
      context: ./postfix-dovecot
      dockerfile: Dockerfile
    profiles: ["postfix-dovecot"]
    container_name: postfix-dovecot
    restart: unless-stopped
    ports:
      - "25:25"    # SMTP inbound (from cloud relay)
      - "587:587"  # SMTP submission (from mail clients)
      - "993:993"  # IMAPS (from mail clients)
    volumes:
      - ./postfix-dovecot/postfix/vmailbox:/etc/postfix/vmailbox:ro
      - ./postfix-dovecot/postfix/virtual:/etc/postfix/virtual:ro
      - ./postfix-dovecot/dovecot/users:/etc/dovecot/users:ro
      - mail-data:/var/mail/vhosts
      - mail-config:/etc/postfix-dovecot
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-example.com}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME:-mail.example.com}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - VIRTUAL_DOMAINS=${VIRTUAL_DOMAINS:-example.com, example.org}
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Roundcube webmail (profile: roundcube)
  roundcube:
    image: roundcube/roundcubemail:1.6.13
    profiles: ["roundcube"]
    container_name: roundcube
    restart: unless-stopped
    ports:
      - "8080:80"    # Caddy reverse proxy connects here
    volumes:
      - ./webmail/roundcube/config.inc.php:/var/roundcube/config/config.inc.php:ro
      - roundcube-data:/var/roundcube/db
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=25M
    extra_hosts:
      - "mail-server:host-gateway"
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SnappyMail webmail (profile: snappymail)
  snappymail:
    image: djmaze/snappymail:2.38.2
    profiles: ["snappymail"]
    container_name: snappymail
    restart: unless-stopped
    ports:
      - "8080:8888"  # SnappyMail internal port is 8888
    volumes:
      - snappymail-data:/var/lib/snappymail
      - ./webmail/snappymail/domains/default.json:/var/lib/snappymail/data/_data_/_default_/domains/default.json:ro
    environment:
      - UPLOAD_MAX_SIZE=25M
      - LOG_TO_STDOUT=true
      - MEMORY_LIMIT=128M
    extra_hosts:
      - "mail-server:host-gateway"
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Radicale CalDAV/CardDAV server (profile: radicale)
  # Only used when mail server is Maddy or Postfix+Dovecot
  # (Stalwart has built-in CalDAV/CardDAV)
  radicale:
    image: tomsquest/docker-radicale:3.6.0
    profiles: ["radicale"]
    container_name: radicale
    restart: unless-stopped
    init: true
    ports:
      - "5232:5232"  # Caddy reverse proxy connects here for CalDAV/CardDAV
    volumes:
      - ./caldav-carddav/radicale/config:/config:ro
      - ./caldav-carddav/radicale/rights:/etc/radicale/rights:ro
      - ./caldav-carddav/radicale/users:/data/users:ro
      - radicale-data:/data/collections
    environment:
      - RADICALE_CONFIG=/config/config
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/.web/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Rspamd spam filter (shared across all mail server options)
  rspamd:
    image: rspamd/rspamd:latest
    container_name: rspamd
    restart: unless-stopped
    ports:
      - "11334:11334"  # Web UI (optional - for admin access to stats)
    volumes:
      - ./spam-filter/rspamd/local.d:/etc/rspamd/local.d:ro
      - ./spam-filter/rspamd/override.d:/etc/rspamd/override.d:ro
      - rspamd-data:/var/lib/rspamd
    networks:
      - darkpipe
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "11332"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis backend for Rspamd greylisting and statistics
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - ./spam-filter/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Profile server for device onboarding (runs with all mail server configurations)
  profile-server:
    build:
      context: ./profiles
      dockerfile: Dockerfile
    container_name: profile-server
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - PROFILE_SERVER_PORT=8090
      - MAIL_DOMAIN=${MAIL_DOMAIN:-example.com}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME:-mail.example.com}
      - MAIL_SERVER_TYPE=${MAIL_SERVER_TYPE:-stalwart}
      - CALDAV_URL=${CALDAV_URL:-}
      - CARDDAV_URL=${CARDDAV_URL:-}
      - ADMIN_USER=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - STALWART_ADMIN_USER=${ADMIN_EMAIL:-admin@example.com}
      - STALWART_ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - profile-data:/data
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  darkpipe:
    driver: bridge

volumes:
  mail-data:
    driver: local
  mail-config:
    driver: local
  rspamd-data:
    driver: local
  redis-data:
    driver: local
  roundcube-data:
    driver: local
  snappymail-data:
    driver: local
  radicale-data:
    driver: local
  profile-data:
    driver: local
