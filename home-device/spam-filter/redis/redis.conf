# Redis configuration for Rspamd greylisting backend
# Redis is only accessible within the darkpipe Docker network, not exposed to host

# Limit Redis memory usage to 64MB (greylisting doesn't need much)
maxmemory 64mb

# Evict oldest entries when memory limit is reached
maxmemory-policy allkeys-lru

# Persistence: snapshot every 15 minutes if at least 1 key changed
# Preserves greylist state across container restarts
save 900 1

# Bind to all interfaces (0.0.0.0) within Docker network
bind 0.0.0.0

# Disable protected mode (Docker network isolation provides security)
# No password needed - Redis is internal to compose network only
protected-mode no

# Default Redis port
port 6379
