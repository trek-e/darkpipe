# Rspamd greylisting configuration
# Greylisting temporarily rejects first-time sender/recipient/IP combinations
# Legitimate servers retry, spammers typically do not

# Redis backend for greylist state persistence
servers = "redis:6379";

# Greylist delay (300s = 5 minutes, standard retry interval)
timeout = 300;

# Expire greylist entries after 24 hours
expire = 86400;

# Only greylist messages with spam score >= 4.0
# Avoids greylisting clean mail (score < 4.0)
greylist_min_score = 4.0;

# Whitelist private networks (includes WireGuard tunnel traffic from cloud relay)
# This prevents greylisting mail forwarded from cloud relay
whitelisted_ip = "/etc/rspamd/local.d/whitelist_ip.map";

# Do not greylist mail from local networks (important for cloud relay forwarded mail)
check_local = false;

# Do not greylist authenticated users sending via submission port 587
check_authed = false;

# 4xx response message for greylisted mail
message = "Service temporarily unavailable, try again later";

# Tell sender when greylisting expires (included in 4xx response)
report_time = true;
