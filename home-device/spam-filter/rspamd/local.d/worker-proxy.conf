# Rspamd milter proxy worker configuration
# Provides milter protocol interface for mail server integration

# Enable milter protocol
milter = yes;

# Listen on all interfaces within Docker network on port 11332
bind_socket = "*:11332";

# Rspamd scans locally (not forwarding to another instance)
upstream "local" {
    default = yes;
    self_scan = yes;
}

# Generous timeout for large messages (120 seconds)
timeout = 120s;
