# Rspamd spam score action thresholds
# Conservative defaults - users can tune based on spam volume

# Reject messages with spam score >= 15 (hard reject)
reject = 15;

# Add X-Spam header for scores >= 6 (low threshold for transparency)
add_header = 6;

# Greylist for scores >= 4 (matches greylist_min_score in greylist.conf)
greylist = 4;

# Rewrite subject with [SPAM] prefix for scores >= 12
rewrite_subject = 12;
