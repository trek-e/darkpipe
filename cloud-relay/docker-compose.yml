services:
  # Caddy reverse proxy (forwards HTTPS traffic to home device webmail)
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /run
    ports:
      - "80:80"       # HTTP (auto-redirect to HTTPS)
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 QUIC
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data        # Let's Encrypt certificates
      - caddy-config:/config    # Caddy config cache
      - caddy-logs:/var/log/caddy
    environment:
      HOME_DEVICE_IP: ${HOME_DEVICE_IP:-10.8.0.2}
      WEBMAIL_DOMAINS: mail.${RELAY_DOMAIN:-example.com}
      AUTOCONFIG_DOMAINS: autoconfig.${RELAY_DOMAIN:-example.com}
      AUTODISCOVER_DOMAINS: autodiscover.${RELAY_DOMAIN:-example.com}
    networks:
      - darkpipe
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:2019/config/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Root required: Postfix master process needs root for queue management, port 25 binding, and setuid helpers
  relay:
    build:
      context: ..
      dockerfile: cloud-relay/Dockerfile
    container_name: darkpipe-relay
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
      - CHOWN
      - SETGID
      - SETUID
      - KILL
    read_only: true
    tmpfs:
      - /var/lib/postfix
      - /tmp
      - /run
      - /var/run
    ports:
      - "25:25"
    environment:
      # Postfix configuration
      RELAY_HOSTNAME: relay.example.com
      RELAY_DOMAIN: example.com

      # Go relay daemon configuration
      RELAY_LISTEN_ADDR: 127.0.0.1:10025
      RELAY_TRANSPORT: wireguard
      RELAY_HOME_ADDR: 10.8.0.2:25

      # mTLS transport (if RELAY_TRANSPORT=mtls)
      # RELAY_CA_CERT: /certs/ca.crt
      # RELAY_CLIENT_CERT: /certs/client.crt
      # RELAY_CLIENT_KEY: /certs/client.key

      RELAY_MAX_MESSAGE_BYTES: 52428800

      # TLS monitoring and notifications
      # RELAY_STRICT_MODE: false
      # RELAY_WEBHOOK_URL: https://webhook.example.com/darkpipe

      # Certbot (for Let's Encrypt certificate automation)
      # CERTBOT_EMAIL: admin@example.com

      # Ephemeral storage verification (default: 60 seconds)
      RELAY_EPHEMERAL_CHECK_INTERVAL: 60

      # Queue configuration (QUEUE-01, QUEUE-03)
      # RELAY_QUEUE_ENABLED: true
      # RELAY_QUEUE_KEY_PATH: /data/queue-keys/identity
      # RELAY_QUEUE_SNAPSHOT_PATH: /data/queue-state/snapshot.json

      # S3 overflow (QUEUE-02, optional - uncomment and configure)
      # RELAY_OVERFLOW_ENABLED: false
      # RELAY_OVERFLOW_ENDPOINT: gateway.storjshare.io
      # RELAY_OVERFLOW_BUCKET: darkpipe-queue
      # RELAY_OVERFLOW_ACCESS_KEY:
      # RELAY_OVERFLOW_SECRET_KEY:

    # Resource limits per UX-02: Must run with less than 256MB RAM on $5/month VPS
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    volumes:
      # Persistent Postfix queue
      - postfix-queue:/var/spool/postfix

      # TLS certificates (placeholder for Plan 02-02)
      - certbot-etc:/etc/letsencrypt:ro

      # Queue data (age identity keys, snapshots)
      - queue-data:/data

      # mTLS certificates (if using mTLS transport)
      # - ./certs:/certs:ro

    # WireGuard support requires /dev/net/tun (NET_ADMIN granted above)
    devices:
      - /dev/net/tun

    restart: unless-stopped

    networks:
      - darkpipe

    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  darkpipe:
    driver: bridge

volumes:
  postfix-queue:
  certbot-etc:
  certbot-var:
  queue-data:
  caddy-data:
  caddy-config:
  caddy-logs:
